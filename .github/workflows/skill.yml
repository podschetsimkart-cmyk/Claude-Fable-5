name: Skill

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      model:
        description: "Модель для живого прогона evals"
        default: "claude-opus-4-8"
      skill:
        description: "Скилл включён (on/off)"
        default: "on"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python scripts/validate_skill.py
      - name: Eval harness self-test
        run: python evals/run_evals.py --dry-run

  evals:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: Live eval run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python evals/run_evals.py \
            --model "${{ inputs.model }}" --skill "${{ inputs.skill }}" \
            --repeats 3 --report eval-report.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-report-${{ inputs.model }}-skill-${{ inputs.skill }}
          path: eval-report.json

  release:
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Build fable5-style.skill
        run: |
          mkdir -p build/fable5-style
          cp SKILL.md build/fable5-style/
          cp -r references build/fable5-style/
          cd build && zip -r fable5-style.skill fable5-style
      - name: Publish to "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=$(grep -oP '^Версия: \K.+' SKILL.md)
          NOTES="Автосборка из main: версия ${VERSION}, коммит ${GITHUB_SHA:0:7}."
          if gh release view latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload latest build/fable5-style.skill --clobber --repo "$GITHUB_REPOSITORY"
            gh release edit latest --title "fable5-style (latest)" --notes "$NOTES" --repo "$GITHUB_REPOSITORY"
          else
            gh release create latest build/fable5-style.skill \
              --title "fable5-style (latest)" --notes "$NOTES" --repo "$GITHUB_REPOSITORY"
          fi
